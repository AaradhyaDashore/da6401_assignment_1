name: mnist_precision_sweep
project: da6401_assignment_1_final
method: random 
metric:
  name: val_acc
  goal: maximize

parameters:
  dataset:
    value: 'mnist'
  num_layers:
    value: 2  
  epochs:
    values: [10, 15]
  batch_size:
    values: [32, 64]
  learning_rate:
    values: [0.001, 0.01, 0.05]
  optimizer:
    values: ['sgd', 'momentum', 'nag', 'rmsprop']
  weight_decay:
    values: [0, 0.0005, 0.005]
  weight_init:
    value: 'xavier'
  activation:
    value: 'relu'
  loss:
    value: 'cross_entropy'

command:
  - ${env}
  - python
  - src/train.py
  - "--hidden_size"
  - "128"
  - "64"
  - ${args}